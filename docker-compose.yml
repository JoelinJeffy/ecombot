version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ecombot-redis
    command: redis-server --requirepass ecombot_redis_pass --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: ecombot-postgres
    environment:
      POSTGRES_DB: ecombot
      POSTGRES_USER: ecombot_user
      POSTGRES_PASSWORD: ecombot_pg_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecombot_user -d ecombot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
